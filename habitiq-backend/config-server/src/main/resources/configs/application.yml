# Shared config for all HabitIQ services (loaded by Config Server)
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    com.habitiq: INFO
    org.springframework.security: WARN
