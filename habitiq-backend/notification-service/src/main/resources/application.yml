server:
  port: 8085

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://localhost:5432/habitiq_notifications
    username: habitiq
    password: habitiq_secret
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: notification-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:your_twilio_sid}
  auth-token: ${TWILIO_AUTH_TOKEN:your_twilio_token}
  whatsapp-from: ${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}
  voice-from: ${TWILIO_VOICE_FROM:+1xxxxxxxxxx}
  webhook-base-url: ${TWILIO_WEBHOOK_BASE_URL:http://localhost:8085}

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
